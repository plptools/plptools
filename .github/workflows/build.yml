name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron:  '0 9 * * *'
  workflow_dispatch:

jobs:
  build:

    strategy:
      matrix:
        include:

          - name: ubuntu-24.04-amd64
            os: ubuntu-24.04
            env:
              ASAN: "yes"
            setup: |
              sudo apt-get -y install libreadline-dev pkg-config gettext autopoint libfuse-dev libattr1-dev

          - name: ubuntu-24.04-arm64
            os: ubuntu-24.04-arm
            env:
              ASAN: "yes"
            setup: |
              sudo apt-get -y install libreadline-dev pkg-config gettext autopoint libfuse-dev libattr1-dev

          - name: debian-bookworm
            os: ubuntu-latest
            container: debian:bookworm
            setup: |
              apt-get update -y
              apt-get install -y build-essential git libtool gpg pkg-config gettext autopoint libreadline-dev

          - name: debian-trixie
            os: ubuntu-latest
            container: debian:trixie
            setup: |
              apt-get update -y
              apt-get install -y build-essential git libtool gpg pkg-config gettext autopoint libreadline-dev

          - name: macos-26
            os: macos-26
            setup: |
              brew install coreutils readline pkg-config libtool automake gettext macfuse
              echo "$(brew --prefix m4)/bin:/usr/local/opt/gettext/bin" >> $GITHUB_PATH
              echo "LDFLAGS=-L$(brew --prefix readline)/lib -F/Library/Filesystems/macfuse.fs/Contents/Frameworks" >> "$GITHUB_ENV"
              echo "CPPFLAGS=-I$(brew --prefix readline)/include" >> "$GITHUB_ENV"

          - name: macos-15
            os: macos-15
            setup: |
              brew install coreutils readline pkg-config libtool automake gettext macfuse
              echo "$(brew --prefix m4)/bin:/usr/local/opt/gettext/bin" >> $GITHUB_PATH
              echo "LDFLAGS=-L$(brew --prefix readline)/lib -F/Library/Filesystems/macfuse.fs/Contents/Frameworks" >> "$GITHUB_ENV"
              echo "CPPFLAGS=-I$(brew --prefix readline)/include" >> "$GITHUB_ENV"

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    defaults:
      run:
        shell: bash

    steps:

    - name: Install dependencies and configure environment
      run: ${{ matrix.setup }}

    - name: Checkout source
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Build
      run: ./build-aux/build.sh

    - name: Run smoke tests
      run: ./build-aux/smoke-tests.sh

  documentation-build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Build documentation
      uses: mattnotmitt/doxygen-action@v1.9.5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./html

  documentation-deploy:
    runs-on: ubuntu-latest

    needs: documentation-build
    if: ${{ github.ref == 'refs/heads/main' }}

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
